---
- name: Deployer Nginx custom dans K3d
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Creer le deployment web
      kubernetes.core.k8s:
        state: present
        context: k3d-lab
        namespace: default
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: web
            namespace: default
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: web
            template:
              metadata:
                labels:
                  app: web
              spec:
                containers:
                  - name: nginx-custom
                    image: nginx-custom:1.0
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 80

    - name: Creer le service web
      kubernetes.core.k8s:
        state: present
        context: k3d-lab
        namespace: default
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: web
            namespace: default
          spec:
            type: NodePort
            selector:
              app: web
            ports:
              - port: 80
                targetPort: 80